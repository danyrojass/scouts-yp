<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <a routerLink="/" class="logo">
                <span class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c-1.5 3-3 5-3 8 0 2 1 3.5 3 3.5s3-1.5 3-3.5c0-3-1.5-5-3-8z"/><path d="M12 14v8"/><path d="M8 18c-2 0-4 1-4 3s2 3 4 3c1 0 2-.5 3-1.5"/><path d="M16 18c2 0 4 1 4 3s-2 3-4 3c-1 0-2-.5-3-1.5"/><path d="M12 2c1.5 3 3 5 3 8 0 2-1 3.5-3 3.5S9 12 9 10c0-3 1.5-5 3-8z"/></svg>
                </span>
                Scout YP 62
            </a>
            @if (isLoggedIn()) {
                <button (click)="toggleMenu()" class="menu-toggle">
                    <span class="menu-icon"></span>
                </button>
            }
        </div>

        @if (isLoggedIn()) {
            <div [class.is-active]="isMenuOpen()" class="navbar-menu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a (click)="isMenuOpen.set(false)" routerLink="/dashboard" routerLinkActive="active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                            Tablero
                        </a>
                    </li>
                    <li class="nav-item">
                        <a (click)="isMenuOpen.set(false)" routerLink="/groups" routerLinkActive="active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            Grupos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a (click)="isMenuOpen.set(false)" routerLink="/users" routerLinkActive="active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Usuarios
                        </a>
                    </li>
                    <li class="nav-item">
                        <a (click)="isMenuOpen.set(false)" routerLink="/sets" routerLinkActive="active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                            Secciones
                        </a>
                    </li>
                    <li class="nav-item">
                        <a (click)="isMenuOpen.set(false)" routerLink="/activities" routerLinkActive="active">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            Actividades
                        </a>
                    </li>
                </ul>
                <div class="navbar-auth">
                    <button (click)="onLogout()" class="btn btn-secondary">Cerrar sesión</button>
                </div>
            </div>
        } @else {
            <div class="navbar-auth" style="border-left: none; padding-left: 0;">
                <a class="btn btn-secondary" routerLink="/login">Iniciar sesión</a>
                <a class="btn btn-primary" routerLink="/register">Registrarse</a>
            </div>
        }
    </div>
</nav>
