@if (message()) {
    <div [class]="'alert-' + type" class="alert">
        <div class="alert-content">
            <span class="alert-message">{{ message() }}</span>
            @if (dismissible()) {
                <button (click)="onDismiss()" class="alert-close">&times;</button>
            }
        </div>
    </div>
}
