<div class="container">
    @if (isLoading()) {
        <div class="loading-container">
            <app-loading-spinner size="lg"></app-loading-spinner>
        </div>
    }

    @if (!isLoading() && group()) {
        <div class="page-header">
            <h1>{{ group()?.name }}</h1>
            @if (currentUser()?.type === UserType.JEFE) {
                <div class="header-actions">
                    <button (click)="onEdit()" class="btn btn-secondary mr-2">Editar</button>
                    <button (click)="onDelete()" class="btn btn-error">Borrar</button>
                </div>
            }
        </div>

        <div class="detail-card">
            <div class="detail-header">
                <span class="badge badge-primary">{{ group()?.number }}</span>
            </div>

            <div class="detail-body">
                <div class="detail-row">
                    <strong>Ciudad:</strong>
                    <span>{{ group()?.city }}</span>
                </div>
                <div class="detail-row">
                    <strong>Creado:</strong>
                    <span>{{ group()?.createdAt | date:'medium' }}</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button (click)="onBack()" class="btn btn-secondary">Volver a Grupos</button>
        </div>
    }

    @if (errorMessage()) {
        <app-alert
                (dismiss)="errorMessage.set('')"
                [message]="errorMessage"
                [type]="'error'">
        </app-alert>
    }
</div>
